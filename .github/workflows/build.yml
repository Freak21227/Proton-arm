name: Build Wine (ARM64)

on:
  push:
    branches: [ experimental_10.0 ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROTON_URL: https://github.com/ValveSoftware/wine/archive/refs/tags/experimental-wine-bleeding-edge-11.0-391323-20260705-p918c96-wc37dd7-dd11701-vf1338a.zip
  INSTALL_PREFIX: ${{ github.workspace }}/dist

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Add deb-src to sources.list
        run: |
          sudo tee -a /etc/apt/sources.list > /dev/null <<EOF
          deb-src http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse
          deb-src http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse
          deb-src http://archive.ubuntu.com/ubuntu/ jammy-backports main restricted universe multiverse
          deb-src http://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse
          EOF
          sudo apt-get update

      - name: Install llvm-mingw (bylaws fork)
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/bylaws/llvm-mingw/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          URL="https://github.com/bylaws/llvm-mingw/releases/download/${RELEASE}/llvm-mingw-${RELEASE}-ucrt-ubuntu-22.04-aarch64.tar.xz"
          curl -L "$URL" | sudo tar -xJ -C /opt
          DIRNAME=$(ls /opt | grep llvm-mingw)
          echo "/opt/${DIRNAME}/bin" >> $GITHUB_PATH

      - name: Fix libunwind-dev conflict
        run: |
          # GitHub'ın ARM64 runner imajında önceden kurulu bir LLVM paketi
          # (libunwind-14-dev / libunwind-18-dev vb.) "Breaks: libunwind-dev"
          # dediği için gerçek Ubuntu libunwind-dev paketi kurulamıyor.
          # Bu çakışan paketi kaldırıp gerçek libunwind-dev'i kuruyoruz.
          CONFLICTING=$(dpkg -l | awk '/^ii[[:space:]]+libunwind-[0-9]+-dev/ {print $2}')
          if [ -n "$CONFLICTING" ]; then
            echo "Removing conflicting packages: $CONFLICTING"
            sudo apt-get purge -y $CONFLICTING
          fi
          sudo apt-get update
          sudo apt-get install -y libunwind-dev

      - name: Install build dependencies
        run: |
          sudo apt-get build-dep -y wine
          sudo apt-get install -y \
            unzip \
            libfontconfig-dev \
            libfreetype-dev \
            libgnutls28-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libkrb5-dev \
            libgl-dev \
            libpulse-dev \
            libsdl2-dev \
            libvulkan-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxinerama-dev \
            libxi-dev \
            libxrandr-dev \
            libxrender-dev \
            libxshmfence-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libxkbregistry-dev \
            flex bison \
            autoconf

      - name: Download Proton source
        run: |
          curl -L -o proton.zip "${{ env.PROTON_URL }}"
          unzip -q proton.zip
          PROTON_DIRNAME=$(find . -maxdepth 1 -type d -name "wine-*" -printf "%f\n")
          echo "PROTON_DIR=${{ github.workspace }}/${PROTON_DIRNAME}" >> $GITHUB_ENV

      - name: Apply patches
        run: |
          shopt -s nullglob
          cd "$PROTON_DIR"
          for patch in "${{ github.workspace }}"/*.patch; do
            echo "==> Applying $(basename "$patch")"
            if git apply --check "$patch" 2>/dev/null; then
              git apply "$patch"
              echo "    applied with: git apply"
            elif patch -p1 --dry-run -f < "$patch" > /dev/null 2>&1; then
              patch -p1 < "$patch"
              echo "    applied with: patch -p1"
            else
              echo "::error::Patch $(basename "$patch") could not be applied with git apply or patch -p1"
              exit 1
            fi
          done

      - name: Autogen
        run: ./autogen.sh
        
      - name: Configure
        run: |
          cd "$PROTON_DIR"
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --disable-tests \
            --with-vulkan \
            --with-wayland \
            --enable-archs=arm64ec,aarch64,i386 \

      - name: Build
        run: |
          cd "$PROTON_DIR"
          make -j$(nproc)
          make install

      - name: Compress
        run: |
          BUILD_DATE=$(date +%Y-%m-%d)
          ARTIFACT_NAME="proton-11.0-arm64ec-${BUILD_DATE}"
          tar -cJf "${ARTIFACT_NAME}.tar.xz" -C "$INSTALL_PREFIX" .
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.xz
          retention-days: 7
          compression-level: 0

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.ARTIFACT_NAME }}
          name: ${{ env.ARTIFACT_NAME }}
          files: ${{ env.ARTIFACT_NAME }}.tar.xz
          generate_release_notes: true
          
